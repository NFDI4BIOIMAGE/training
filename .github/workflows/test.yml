name: test-deploy-search-site

# Only run this when a pull-request is sent to main
on:
  pull_request:
    branches:
    - main

# This job installs dependencies and builds the search site
jobs:
  deploy-search-site:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2


    # Install dependencies
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'



    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get install -y poppler-utils

    - name: Build search site
      run: |
        python scripts/build_search_site.py

    - name: Validate build output
      run: |
        test -f dist/index.html
        test -f dist/app.js
        test -f dist/styles.css
        test -f dist/data.json
        test -f dist/logo.png
        
